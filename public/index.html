<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />

		<!-- Favicon -->
		<link rel="icon" href="./LOGO.jpeg" />

		<!-- Mobile responsiveness -->
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<meta name="theme-color" content="#000000" />

		<!-- SEO Description (IMPORTANT: replace default CRA text) -->
		<meta
		  name="description"
		  content="HK Fitness - Personal Trainer in Dubai. Get expert coaching for fat loss, muscle gain, strength training and body transformation programs."
    />

		<!-- Keywords (optional but still used lightly) -->
		<meta
		  name="keywords"
		  content="personal trainer Dubai, fitness coach Dubai, weight loss Dubai, gym trainer Dubai, online coaching UAE"
    />

		<meta name="author" content="HK Fitness" />

		<!-- Canonical (VERY IMPORTANT for SEO) -->
		<link rel="canonical" href="https://www.hkfitness.ae" />

		<!-- Open Graph (social sharing) -->
		<meta property="og:title" content="HK Fitness | Personal Trainer Dubai" />
		<meta
		  property="og:description"
		  content="Transform your body with expert personal training in Dubai."
    />
		<meta property="og:image" content="https://www.hkfitness.ae" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://www.hkfitness.ae" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />

		<!-- Fonts -->
		<link
		  href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
		  rel="stylesheet"
    />

		<!-- Manifest -->
		<link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

		<title>Personal Trainer Dubai | HK Fitness Coaching</title>
	</head>

	<body>
		<noscript>You need to enable JavaScript to run this app.</noscript>
		<div id="root"></div>
	</body>
</html>
